// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
  repositories {
    google()
    mavenCentral()
  }
  dependencies {
    classpath('com.android.tools.build:gradle')
    classpath('com.facebook.react:react-native-gradle-plugin')
    classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
  }
}

allprojects {
  repositories {
    google()
    mavenCentral()
    maven { url 'https://www.jitpack.io' }
  }

  // Fix: expo module AARs (expo-keep-awake, expo-asset, expo-file-system, etc.) are pre-compiled
  // with Kotlin 2.1.x, but the Kotlin compiler from react-native's KGP 1.9.25 expects metadata
  // version ≤ 1.9.0. Use -Xskip-metadata-version-check to allow compilation without strict
  // metadata version enforcement. Safe because the JVM bytecode itself is compatible.
  afterEvaluate {
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
      kotlinOptions {
        freeCompilerArgs += ['-Xskip-metadata-version-check']
      }
    }
  }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"
